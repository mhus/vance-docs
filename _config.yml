title: Vance
description: >-
  Collaborative Brain — a system that takes assignments, executes them with the
  right tools and engines, and delivers verifiable results. For teams.
url: "https://vance.mhus.de"
baseurl: ""
lang: en

remote_theme: just-the-docs/just-the-docs

color_scheme: dark
search_enabled: true
heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/mhus/vance"
  "Impressum":
    - "/impressum"

aux_links_new_tab: true

footer_content: >-
  &copy; 2025-2026 Mike Hummel · Documentation under
  <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a> ·
  Source on <a href="https://github.com/mhus/vance-docs">GitHub</a> ·
  <a href="/impressum">Impressum</a>.

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# GitHub Pages auto-loads jekyll-optional-front-matter, which adds empty
# frontmatter to every .md file without one. We need llm/specification/*.md
# to be served verbatim (no Jekyll processing) for LLM consumption.
optional_front_matter:
  enabled: false

# Keep the LLM tree out of just-the-docs' main nav index; it's served as
# raw markdown for tools, not for human browsing.
defaults:
  - scope:
      path: "llm"
    values:
      sitemap: false
      nav_exclude: true

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - README.md
